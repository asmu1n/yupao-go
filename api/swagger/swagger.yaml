basePath: /api
definitions:
  resp.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  user.LoginParams:
    properties:
      userAccount:
        minLength: 4
        type: string
      userPassword:
        minLength: 8
        type: string
    required:
    - userAccount
    - userPassword
    type: object
  user.RegisterParams:
    properties:
      checkPassword:
        minLength: 8
        type: string
      planetCode:
        maxLength: 20
        type: string
      userAccount:
        maxLength: 256
        minLength: 4
        type: string
      userPassword:
        minLength: 8
        type: string
    required:
    - checkPassword
    - planetCode
    - userAccount
    - userPassword
    type: object
  user.User:
    properties:
      avatarUrl:
        type: string
      createTime:
        type: string
      email:
        type: string
      gender:
        $ref: '#/definitions/usertype.Gender'
      id:
        type: integer
      phone:
        type: string
      planetCode:
        type: string
      tags:
        type: string
      userAccount:
        type: string
      userRole:
        type: integer
      userStatus:
        type: integer
      username:
        type: string
    type: object
  usertype.Gender:
    enum:
    - 1
    - 2
    format: int32
    type: integer
    x-enum-varnames:
    - GenderMale
    - GenderFemale
host: localhost:8080
info:
  contact: {}
  description: 伙伴匹配系统后端接口文档
  title: Yupao Go API
  version: "1.0"
paths:
  /user/current:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/resp.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.User'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - SessionAuth: []
      summary: 获取当前登录用户
      tags:
      - user
  /user/login:
    post:
      consumes:
      - application/json
      description: 用户登录接口，成功后写入 session cookie
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.LoginParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/resp.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resp.Response'
      summary: 用户登录
      tags:
      - user
  /user/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - SessionAuth: []
      summary: 用户注销
      tags:
      - user
  /user/match:
    get:
      parameters:
      - description: 推荐数量
        in: query
        maximum: 20
        minimum: 1
        name: num
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/resp.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/user.User'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - SessionAuth: []
      summary: 匹配相似用户
      tags:
      - user
  /user/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.RegisterParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/resp.Response'
            - properties:
                data:
                  format: int64
                  type: integer
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resp.Response'
      summary: 用户注册
      tags:
      - user
  /user/search/tags:
    get:
      parameters:
      - collectionFormat: csv
        description: 标签列表
        in: query
        items:
          type: string
        name: tagNameList
        required: true
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/resp.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/user.User'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - SessionAuth: []
      summary: 根据标签搜索用户
      tags:
      - user
  /user/update:
    post:
      consumes:
      - application/json
      parameters:
      - description: 用户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resp.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - SessionAuth: []
      summary: 更新用户信息
      tags:
      - user
securityDefinitions:
  SessionAuth:
    description: 'Session cookie authentication. Example: session=your-session-id'
    in: header
    name: Cookie
    type: apiKey
swagger: "2.0"
