# Dev overlay: expose DB/Redis to the host; do not start app by default.
# Host Go process should use DB_HOST=localhost / REDIS_HOST=localhost (see .env.example).
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   go run ./cmd/server
#
# Optional full stack in containers:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile full up -d --build

services:
  postgres:
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  app:
    profiles: ["full"]
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
